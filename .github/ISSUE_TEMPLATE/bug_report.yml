name: Bug report
description: Something isn't working right
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: Nice version
      description: "Find it in the menu bar: Nice → About Nice"
      placeholder: "e.g. 0.11.0"
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "e.g. macOS 15.3 Sequoia"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Nice
        2. Do X
        3. See Y
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots (optional)
      description: Paste relevant output from Console.app or attach a screenshot
