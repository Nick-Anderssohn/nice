name: release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    # Pinned to macos-26 so we can use Xcode 26, which matches local dev.
    # Swift 6.0 (Xcode 16.2 on macos-14) flags several strict-concurrency
    # patterns that Swift 6.3 (Xcode 26) has relaxed, so older images fail
    # this repo's Release archive.
    runs-on: macos-26
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.4"

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Import Developer ID signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          p12-password: ${{ secrets.APPLE_CERT_P12_PASSWORD }}

      - name: Build, sign, notarize, staple
        id: release
        run: scripts/release.sh --version "${{ steps.version.outputs.version }}"
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.release.outputs.zip }}
          generate_release_notes: true
          fail_on_unmatched_files: true

      - name: Check out homebrew-nice tap
        uses: actions/checkout@v4
        with:
          repository: Nick-Anderssohn/homebrew-nice
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Patch Casks/nice.rb
        env:
          VERSION: ${{ steps.release.outputs.version }}
          SHA256: ${{ steps.release.outputs.sha256 }}
        run: |
          cd tap
          sed -i '' -E "s|version \".*\"|version \"${VERSION}\"|" Casks/nice.rb
          sed -i '' -E "s|sha256 \".*\"|sha256 \"${SHA256}\"|" Casks/nice.rb

      - name: Open cask bump PR
        uses: peter-evans/create-pull-request@v6
        with:
          path: tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          branch: bump-nice-${{ steps.release.outputs.version }}
          base: main
          title: "nice ${{ steps.release.outputs.version }}"
          commit-message: "nice ${{ steps.release.outputs.version }}"
          body: |
            Automated bump from ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}.

            sha256: `${{ steps.release.outputs.sha256 }}`
