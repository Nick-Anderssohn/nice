name: release-rs

# Experimental Homebrew channel for the Rust rewrite ("Nice RS Dev.app").
# Tag rs-vX.Y.Z on the rust-rewrite branch → signed/notarized/stapled zip →
# GitHub PRERELEASE (invisible to prod Nice's update checker, which polls
# /releases/latest — the API excludes prereleases) → bump PR for the
# separate Casks/nice-rs.rb in homebrew-nice (prod `nice` cask untouched).

on:
  push:
    tags:
      - 'rs-v*.*.*'

jobs:
  release:
    # macos-26 matches the Swift release job; codesign/notarytool ship with
    # the image's Xcode.
    runs-on: macos-26
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#rs-v}" >> "$GITHUB_OUTPUT"

      # The zed mirror is ~1–2 GB; cache it keyed on the pin so only the
      # first run after a pin change pays the bare clone.
      - name: Read zed pin
        id: zedpin
        run: echo "pin=$(awk -F'"' '/^ZED_PIN=/{print $2}' scripts/vendor-zed.sh)" >> "$GITHUB_OUTPUT"

      - name: Cache zed mirror
        uses: actions/cache@v4
        with:
          path: ~/.cache/nice/zed-mirror.git
          key: zed-mirror-${{ steps.zedpin.outputs.pin }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: release-rs

      - name: Import Developer ID signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          p12-password: ${{ secrets.APPLE_CERT_P12_PASSWORD }}

      - name: Build, sign, notarize, staple
        id: release
        run: scripts/release-rs.sh --version "${{ steps.version.outputs.version }}"
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}

      - name: Create GitHub Release (prerelease)
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.release.outputs.zip }}
          prerelease: true
          generate_release_notes: true
          fail_on_unmatched_files: true

      - name: Check out homebrew-nice tap
        uses: actions/checkout@v4
        with:
          repository: Nick-Anderssohn/homebrew-nice
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Patch Casks/nice-rs.rb
        env:
          VERSION: ${{ steps.release.outputs.version }}
          SHA256: ${{ steps.release.outputs.sha256 }}
        run: |
          cd tap
          sed -i '' -E "s|version \".*\"|version \"${VERSION}\"|" Casks/nice-rs.rb
          sed -i '' -E "s|sha256 \".*\"|sha256 \"${SHA256}\"|" Casks/nice-rs.rb

      - name: Open cask bump PR
        uses: peter-evans/create-pull-request@v6
        with:
          path: tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          branch: bump-nice-rs-${{ steps.release.outputs.version }}
          base: main
          title: "nice-rs ${{ steps.release.outputs.version }} (experimental)"
          commit-message: "nice-rs ${{ steps.release.outputs.version }}"
          body: |
            Automated bump from ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }} (prerelease / experimental channel).

            sha256: `${{ steps.release.outputs.sha256 }}`
