name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.4"

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Run tests
        run: scripts/test.sh
