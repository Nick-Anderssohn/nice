name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-26
    # Job-level env so the Swift runtime backtrace dumper turns on for
    # every child process xcodebuild forks — including the test host.
    # On abort the runtime prints a full stack to stderr, which xctest
    # captures into StandardOutputAndStandardError.txt inside the
    # xcresult diagnostics bundle.
    env:
      SWIFT_BACKTRACE: "enable=yes,output-to=stderr,interactive=no"
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.4"

      - name: Install xcodegen
        run: brew install xcodegen

      # Unit and UI tests are split so a unit-host crash doesn't mask
      # UI-test failures (and vice versa). Each step runs independently
      # via `if: always()` so we always get a signal from both.
      - name: Run unit tests
        id: unit
        run: scripts/test.sh -only-testing:NiceUnitTests

      - name: Run UI tests
        if: always()
        id: ui
        run: scripts/test.sh -only-testing:NiceUITests

      # On any test failure, upload the xcresult bundle so we can pull
      # the actual crash backtrace + diagnostic logs out of CI. The
      # bundle lives under build-dev/Logs/Test/.
      - name: Upload xcresult on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcresult-${{ github.run_id }}
          path: build-dev/Logs/Test/*.xcresult
          if-no-files-found: ignore
          retention-days: 14

      # macOS writes per-process .ips crash reports here when a process
      # aborts. The xcresult diagnostics bundle doesn't include these,
      # so collect them separately.
      - name: Upload macOS crash reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: crash-reports-${{ github.run_id }}
          path: |
            ~/Library/Logs/DiagnosticReports/Nice*
            /Library/Logs/DiagnosticReports/Nice*
          if-no-files-found: ignore
          retention-days: 14
