name: test

on:
  push:
    branches: [rust-rewrite]
  pull_request:

jobs:
  test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      # The zed mirror is ~1–2 GB; cache it keyed on the pin so only the
      # first run after a pin change pays the bare clone.
      - name: Read zed pin
        id: zedpin
        run: echo "pin=$(awk -F'"' '/^ZED_PIN=/{print $2}' scripts/vendor-zed.sh)" >> "$GITHUB_OUTPUT"

      - name: Cache zed mirror
        uses: actions/cache@v4
        with:
          path: ~/.cache/nice/zed-mirror.git
          key: zed-mirror-${{ steps.zedpin.outputs.pin }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: test

      # Materialize the pinned + patched GPUI checkout the workspace
      # path-depends on (vendor/zed is gitignored).
      - name: Vendor GPUI
        run: scripts/vendor-zed.sh

      # Layer 1 (per-crate unit) + everything else that runs under libtest.
      - name: Run workspace tests
        run: cargo test --workspace

      # Layer 2: in-process gpui integration tests on the simulated clock.
      # Runs headless; no display-bound Swift UITest skip logic here.
      - name: Run in-process integration tests
        run: cargo test -p nice-itests
