name: Nice
options:
  bundleIdPrefix: dev.nickanderssohn
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
    DEAD_CODE_STRIPPING: YES
    CLANG_ENABLE_MODULES: YES

packages:
  SwiftTerm:
    # Nick-Anderssohn/SwiftTerm fast-render branch: upstream's PR #484
    # Metal-renderer revision (f37922e, March 2026) plus a one-file
    # patch that drops the legacy 1/60s render throttle on the Metal
    # path. MTKView's own vsync coalescing handles frame pacing from
    # there — removing the timer cuts ~16–33ms off typing latency and
    # fixes held-key jitter (visibly smoother held backspace).
    # To pick up an upstream bump, rebase `fast-render` onto the new
    # revision and update the pin here.
    url: https://github.com/Nick-Anderssohn/SwiftTerm.git
    revision: ccc89077f5dc6331138a07adc9975c4af13e33fd
  MCP:
    url: https://github.com/modelcontextprotocol/swift-sdk.git
    from: 0.12.0

targets:
  Nice:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/Nice
      - path: Resources/Assets.xcassets
        buildPhase: resources
    dependencies:
      - package: SwiftTerm
        product: SwiftTerm
      - package: MCP
        product: MCP
    entitlements:
      path: Resources/Nice.entitlements
      properties:
        com.apple.security.app-sandbox: false
    info:
      path: Resources/Info.generated.plist
      properties:
        CFBundleName: Nice
        CFBundleDisplayName: Nice
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        CFBundleIdentifier: dev.nickanderssohn.nice
        CFBundlePackageType: APPL
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIconName: AppIcon
        LSMinimumSystemVersion: "14.0"
        NSHumanReadableCopyright: "Copyright (c) 2026 Nick Anderssohn. All rights reserved."
        NSHighResolutionCapable: true
        NSMainStoryboardFile: ""
        LSApplicationCategoryType: public.app-category.developer-tools
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.nickanderssohn.nice
        PRODUCT_NAME: Nice
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        SWIFT_STRICT_CONCURRENCY: complete

  NiceUITests:
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: UITests
    dependencies:
      - target: Nice
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.nickanderssohn.nice.uitests
        PRODUCT_NAME: NiceUITests
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        TEST_TARGET_NAME: Nice
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: YES
        ENABLE_HARDENED_RUNTIME: NO

  NiceUnitTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Tests/NiceUnitTests
    dependencies:
      - target: Nice
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.nickanderssohn.nice.unittests
        PRODUCT_NAME: NiceUnitTests
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
        ENABLE_HARDENED_RUNTIME: NO
        SWIFT_STRICT_CONCURRENCY: complete

schemes:
  Nice:
    build:
      targets:
        Nice: all
        NiceUnitTests: [test]
        NiceUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - NiceUnitTests
        - NiceUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
