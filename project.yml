name: Nice
options:
  bundleIdPrefix: dev.nickanderssohn
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
    DEAD_CODE_STRIPPING: YES
    CLANG_ENABLE_MODULES: YES

packages:
  SwiftTerm:
    # Nick-Anderssohn/SwiftTerm fork: upstream PR #484's Metal renderer
    # (f37922e, March 2026) plus our local patches:
    #   - drop the legacy 1/60s render throttle on the Metal path
    #   - paint via MTKView.draw() instead of setNeedsDisplay so rapid
    #     PTY bursts can't be dropped by AppKit's display scheduling
    #   - pixel-precise smooth scrolling on the Metal path: row vertex
    #     positions live in yDisp-independent buffer-space and the
    #     scroll position is applied at draw time via a shader uniform
    #   - route the nil-drawable fallback through MTKView.draw() too
    #     (the last setNeedsDisplay site that slipped through the
    #     original draw() rewrite and left output stuck after a
    #     transient nil drawable until the user interacted)
    # The throttle/draw work cut ~16-33ms off typing latency
    # (visibly smoother held backspace) without the missing-output
    # regression the throttle was masking. Smooth scrolling is opt-in
    # via `MacTerminalView.smoothScrollingEnabled` (Nice plumbs it
    # through `Tweaks.smoothScrolling`, default on).
    # To pick up an upstream bump, rebase the fork branch onto the new
    # revision and update the pin here.
    #
    # While iterating on SwiftTerm itself, swap to a local path:
    #   path: ../SwiftTerm
    # and revert before committing.
    url: https://github.com/Nick-Anderssohn/SwiftTerm.git
    revision: 36d71903d42a99cea45f736c93c11d65b027112f

targets:
  Nice:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/Nice
      - path: Resources/Assets.xcassets
        buildPhase: resources
      - path: Resources/AppIcon.icon
        buildPhase: resources
    dependencies:
      - package: SwiftTerm
        product: SwiftTerm
    entitlements:
      path: Resources/Nice.entitlements
      properties:
        com.apple.security.app-sandbox: false
    info:
      path: Resources/Info.generated.plist
      properties:
        # $(PRODUCT_NAME) / $(PRODUCT_BUNDLE_IDENTIFIER) let install.sh
        # and test.sh build a separate `Nice Dev` variant by overriding
        # those build settings on the xcodebuild command line. See
        # scripts/install.sh for the override flow.
        CFBundleName: $(PRODUCT_NAME)
        CFBundleDisplayName: $(PRODUCT_NAME)
        CFBundleShortVersionString: "0.1.7"
        CFBundleVersion: "1"
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundlePackageType: APPL
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIconName: AppIcon
        LSMinimumSystemVersion: "14.0"
        NSHumanReadableCopyright: "Copyright (c) 2026 Nick Anderssohn. All rights reserved."
        NSHighResolutionCapable: true
        NSMainStoryboardFile: ""
        LSApplicationCategoryType: public.app-category.developer-tools
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.nickanderssohn.nice
        PRODUCT_NAME: Nice
        MARKETING_VERSION: "0.1.7"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        SWIFT_STRICT_CONCURRENCY: complete

  NiceUITests:
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: UITests
    dependencies:
      - target: Nice
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.nickanderssohn.nice.uitests
        PRODUCT_NAME: NiceUITests
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        TEST_TARGET_NAME: Nice
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: YES
        ENABLE_HARDENED_RUNTIME: NO

  NiceUnitTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Tests/NiceUnitTests
    dependencies:
      - target: Nice
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.nickanderssohn.nice.unittests
        PRODUCT_NAME: NiceUnitTests
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
        ENABLE_HARDENED_RUNTIME: NO
        SWIFT_STRICT_CONCURRENCY: complete

schemes:
  Nice:
    build:
      targets:
        Nice: all
        NiceUnitTests: [test]
        NiceUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - NiceUnitTests
        - NiceUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
