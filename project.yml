name: Nice
options:
  bundleIdPrefix: dev.nickanderssohn
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
    DEAD_CODE_STRIPPING: YES
    CLANG_ENABLE_MODULES: YES

packages:
  SwiftTerm:
    # Nick-Anderssohn/SwiftTerm fork: upstream PR #484's Metal renderer
    # (f37922e, March 2026) plus our local patches:
    #   - drop the legacy 1/60s render throttle on the Metal path
    #   - paint via MTKView.draw() instead of setNeedsDisplay so rapid
    #     PTY bursts can't be dropped by AppKit's display scheduling
    #   - pixel-precise smooth scrolling on the Metal path: row vertex
    #     positions live in yDisp-independent buffer-space and the
    #     scroll position is applied at draw time via a shader uniform
    #   - route the nil-drawable fallback through MTKView.draw() too
    #     (the last setNeedsDisplay site that slipped through the
    #     original draw() rewrite and left output stuck after a
    #     transient nil drawable until the user interacted)
    #   - wire `Terminal.userScrolling` on every scroll path so PTY
    #     output no longer yanks the viewport back to the bottom
    #     while the user is scrolled up. Sticky-bottom auto-resumes
    #     when yDisp returns to yBase; typing snaps to bottom via
    #     the existing ensureCaretIsVisible() path.
    #   - preserve text selection across streaming output and
    #     scrollback eviction. The view-layer selection clears on
    #     `feedPrepare` / `linefeed` are gone, so a highlight no
    #     longer blinks out on every pty chunk; selection rows are
    #     translated when scrollback evicts a line so the highlight
    #     stays pinned to the same content (clears only when the
    #     entire range falls off the top of scrollback).
    #   - close the pendingRedraw consume-before-mark race in
    #     `MetalTerminalRenderer.draw(in:)`: the previous order let
    #     an in-flight buffer's completion handler read
    #     pendingRedraw=false in the gap between the non-blocking
    #     `wait` failing and `mark` setting it, stranding the
    #     redraw with no consumer. Now mark before wait, consume on
    #     success. Bumped frameSemaphore from 1 to 3 (Apple's
    #     standard triple-buffering, so wait-fails are ~3x rarer in
    #     steady state) and dropped the `window.isVisible` guard on
    #     the nil-drawable reschedule that previously left the flag
    #     set without a consumer when the window was hidden.
    #   - allocate a fresh atlas texture in `GlyphAtlas.reset()`
    #     instead of `texture.replace`-ing the existing one in
    #     place. With frameSemaphore=3, prior in-flight frames may
    #     still be GPU-sampling the atlas when reset() runs; the
    #     in-place clear violated Metal's no-modify-while-bound
    #     rule and could produce a few frames of glyph corruption
    #     after an atlas overflow. Mirrors what grow() already
    #     does; falls back to the in-place clear only if the
    #     fresh allocation fails.
    #   - coalesce UI-driven resize bursts at
    #     `AppleTerminalView.processSizeChange`: the sidebar/window
    #     fast-drag prompt-stack bug was a SIGWINCH-vs-shell-redraw
    #     race. Resizes now collapse to one apply per
    #     `resizeDebounceMs` window (default 200 ms, matches iTerm2),
    #     latest-wins, with the timer NOT rescheduled by new
    #     arrivals so sustained drags still land. Set
    #     `view.resizeDebounceMs = 0` to disable. Same fix shape
    #     Ghostty/iTerm2/kitty all use, but at the
    #     `processSizeChange` chokepoint so it covers every
    #     UI-driven resize source uniformly.
    #   - opt-in `TerminalOptions.reflowCursorLine` flag (default
    #     false, matches xterm/upstream) gates the
    #     `getLinesToRemove` cursor-merge behavior on widen.
    #     Setting `reflowCursorLine: true` joins wrapped blocks
    #     containing the cursor and translates the cursor's logical
    #     position into the merged layout — needed when the host
    #     view briefly lays out at a tiny initial size before
    #     real geometry resolves (the startup-duplication
    #     variant of the resize bug). Nice constructs Terminal
    #     with this set to true.
    # The throttle/draw work cut ~16-33ms off typing latency
    # (visibly smoother held backspace) without the missing-output
    # regression the throttle was masking. Smooth scrolling is opt-in
    # via `MacTerminalView.smoothScrollingEnabled` (Nice plumbs it
    # through `Tweaks.smoothScrolling`, default on).
    # These patches all live on the fork's `main` branch now; no
    # feature branches needed. To pick up an upstream bump, rebase
    # the fork onto the new revision and update the pin here.
    #
    # While iterating on SwiftTerm itself, swap to a local path:
    #   path: ../SwiftTerm
    # and revert before committing.
    url: https://github.com/Nick-Anderssohn/SwiftTerm.git
    revision: 14f98ada437ed1b087e20f5efe49ca2b0b6211ea

targets:
  Nice:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/Nice
      - path: Resources/Assets.xcassets
        buildPhase: resources
      - path: Resources/AppIcon.icon
        buildPhase: resources
    dependencies:
      - package: SwiftTerm
        product: SwiftTerm
    entitlements:
      path: Resources/Nice.entitlements
      properties:
        com.apple.security.app-sandbox: false
    info:
      path: Resources/Info.generated.plist
      properties:
        # $(PRODUCT_NAME) / $(PRODUCT_BUNDLE_IDENTIFIER) let install.sh
        # and test.sh build a separate `Nice Dev` variant by overriding
        # those build settings on the xcodebuild command line. See
        # scripts/install.sh for the override flow.
        CFBundleName: $(PRODUCT_NAME)
        CFBundleDisplayName: $(PRODUCT_NAME)
        CFBundleShortVersionString: "0.18.1"
        CFBundleVersion: "1"
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundlePackageType: APPL
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIconName: AppIcon
        LSMinimumSystemVersion: "14.0"
        NSHumanReadableCopyright: "Copyright (c) 2026 Nick Anderssohn. All rights reserved."
        NSHighResolutionCapable: true
        NSMainStoryboardFile: ""
        LSApplicationCategoryType: public.app-category.developer-tools
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.nickanderssohn.nice
        PRODUCT_NAME: Nice
        MARKETING_VERSION: "0.18.1"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        SWIFT_STRICT_CONCURRENCY: complete

  NiceUITests:
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: UITests
    dependencies:
      - target: Nice
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.nickanderssohn.nice.uitests
        PRODUCT_NAME: NiceUITests
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        TEST_TARGET_NAME: Nice
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: YES
        ENABLE_HARDENED_RUNTIME: NO

  NiceUnitTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Tests/NiceUnitTests
    dependencies:
      - target: Nice
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.nickanderssohn.nice.unittests
        PRODUCT_NAME: NiceUnitTests
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
        ENABLE_HARDENED_RUNTIME: NO
        SWIFT_STRICT_CONCURRENCY: complete

schemes:
  Nice:
    build:
      targets:
        Nice: all
        NiceUnitTests: [test]
        NiceUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - NiceUnitTests
        - NiceUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
