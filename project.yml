name: Nice
options:
  bundleIdPrefix: dev.nickanderssohn
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
    DEAD_CODE_STRIPPING: YES
    CLANG_ENABLE_MODULES: YES

targets:
  Nice:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/Nice
    resources:
      - path: Resources
        excludes:
          - Nice.entitlements
    entitlements:
      path: Resources/Nice.entitlements
      properties:
        com.apple.security.app-sandbox: false
    info:
      path: Resources/Info.generated.plist
      properties:
        CFBundleName: Nice
        CFBundleDisplayName: Nice
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        CFBundleIdentifier: dev.nickanderssohn.nice
        CFBundlePackageType: APPL
        CFBundleExecutable: $(EXECUTABLE_NAME)
        LSMinimumSystemVersion: "14.0"
        NSHumanReadableCopyright: "Copyright (c) 2026 Nick Anderssohn. All rights reserved."
        NSHighResolutionCapable: true
        NSMainStoryboardFile: ""
        LSApplicationCategoryType: public.app-category.developer-tools
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.nickanderssohn.nice
        PRODUCT_NAME: Nice
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        SWIFT_STRICT_CONCURRENCY: complete
